site_name: "Reference Addon Template"
site_description: Documentation for Reference Addon Template
repo_url: https://github.com/POps-Rox/ref-addon-template
edit_uri: edit/main/docs/

nav:
  - Home: index.md

plugins:
  - techdocs-core

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
